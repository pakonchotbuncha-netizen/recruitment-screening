<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Dashboard - ส่งแบบทดสอบทักษะ</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { color: #333; margin-bottom: 10px; }
.subtitle { color: #666; margin-bottom: 30px; }
.card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
.stat { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
.stat-value { font-size: 32px; font-weight: bold; color: #1976d2; }
.stat-label { color: #666; margin-top: 5px; font-size: 14px; }
.filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filters select, .filters input { padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
table { width: 100%; border-collapse: collapse; }
th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #ddd; }
td { padding: 12px; border-bottom: 1px solid #eee; }
tr:hover { background: #f9f9f9; }
.status { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.status-pending { background: #fff3e0; color: #e65100; }
.status-sent { background: #e3f2fd; color: #1976d2; }
.status-completed { background: #e8f5e9; color: #2e7d32; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
.btn-send { background: #ff9800; color: white; }
.btn-send:hover { background: #f57c00; }
.btn-view { background: #2196f3; color: white; }
.btn-view:hover { background: #1976d2; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.action-buttons { display: flex; gap: 8px; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state-icon { font-size: 64px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="container">
<h1>📊 HR Dashboard - ส่งแบบทดสอบทักษะ</h1>
<p class="subtitle">จัดการและส่งแบบทดสอบทักษะให้ผู้สมัคร (HR ส่งเอง)</p>

<div class="stats">
<div class="stat">
<div class="stat-value" id="statTotal">0</div>
<div class="stat-label">ผู้สมัครทั้งหมด</div>
</div>
<div class="stat">
<div class="stat-value" id="statPending" style="color:#e65100">0</div>
<div class="stat-label">ยังไม่ส่ง</div>
</div>
<div class="stat">
<div class="stat-value" id="statSent" style="color:#1976d2">0</div>
<div class="stat-label">ส่งแล้ว</div>
</div>
<div class="stat">
<div class="stat-value" id="statCompleted" style="color:#2e7d32">0</div>
<div class="stat-label">ทำเสร็จแล้ว</div>
</div>
</div>

<div class="card">
<h2>🔍 ตัวกรอง</h2>
<div class="filters">
<select id="statusFilter" onchange="render()">
<option value="all">ทุกสถานะ</option>
<option value="pending">ยังไม่ส่ง</option>
<option value="sent">ส่งแล้ว</option>
<option value="completed">ทำเสร็จแล้ว</option>
</select>
<input type="text" id="searchInput" onkeyup="render()" placeholder="🔍 ค้นหาชื่อ/ตำแหน่ง...">
</div>
</div>

<div class="card">
<h2>👥 รายชื่อผู้สมัคร</h2>
<div id="applicantsList"></div>
</div>
</div>

<script>
// โหลดข้อมูลผู้สมัคร
const applicants = JSON.parse(localStorage.getItem('applicants') || '[]');
const assessments = JSON.parse(localStorage.getItem('assessments') || '[]');

// อัปเดตสถานะแบบทดสอบทักษะ
applicants.forEach(applicant => {
  const skillAssessment = assessments.find(a => a.applicantId === applicant.id && a.testType === 'skill');
  if (skillAssessment) {
    applicant.skillTestStatus = 'completed';
    applicant.skillTestDate = skillAssessment.submittedAt;
  } else if (applicant.skillTestSent) {
    applicant.skillTestStatus = 'sent';
  } else {
    applicant.skillTestStatus = 'pending';
  }
});

function render() {
  const statusFilter = document.getElementById('statusFilter').value;
  const searchInput = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = applicants;
  
  if (statusFilter !== 'all') {
    filtered = filtered.filter(a => a.skillTestStatus === statusFilter);
  }
  
  if (searchInput) {
    filtered = filtered.filter(a => 
      (a.fullName || '').toLowerCase().includes(searchInput) ||
      (a.position || '').toLowerCase().includes(searchInput)
    );
  }
  
  // อัปเดตสถิติ
  document.getElementById('statTotal').textContent = applicants.length;
  document.getElementById('statPending').textContent = applicants.filter(a => a.skillTestStatus === 'pending').length;
  document.getElementById('statSent').textContent = applicants.filter(a => a.skillTestStatus === 'sent').length;
  document.getElementById('statCompleted').textContent = applicants.filter(a => a.skillTestStatus === 'completed').length;
  
  const list = document.getElementById('applicantsList');
  
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <p>ไม่พบข้อมูลผู้สมัคร</p>
      </div>
    `;
    return;
  }
  
  list.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ชื่อ-นามสกุล</th>
          <th>ตำแหน่ง</th>
          <th>Email</th>
          <th>สถานะ</th>
          <th>การดำเนินการ</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(a => `
          <tr>
            <td><strong>${a.fullName || '-'}</strong></td>
            <td>${a.position || '-'}</td>
            <td>${a.email || '-'}</td>
            <td>
              <span class="status status-${a.skillTestStatus}">
                ${getStatusText(a.skillTestStatus)}
              </span>
            </td>
            <td>
              <div class="action-buttons">
                ${a.skillTestStatus === 'pending' ? `
                  <button class="btn btn-send" onclick="sendSkillTest('${a.id}')">📧 ส่งแบบทดสอบ</button>
                ` : ''}
                ${a.skillTestStatus === 'sent' ? `
                  <button class="btn btn-view" onclick="viewStatus('${a.id}')" disabled>⏳ รอทำแบบทดสอบ</button>
                ` : ''}
                ${a.skillTestStatus === 'completed' ? `
                  <button class="btn btn-view" onclick="viewResult('${a.id}')">📊 ดูผลคะแนน</button>
                ` : ''}
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function getStatusText(status) {
  const map = {
    'pending': 'ยังไม่ส่ง',
    'sent': 'ส่งแล้ว',
    'completed': 'ทำเสร็จแล้ว'
  };
  return map[status] || status;
}

function sendSkillTest(applicantId) {
  const applicant = applicants.find(a => a.id === applicantId);
  if (!applicant) return;
  
  if (!applicant.email) {
    alert('❌ ผู้สมัครไม่มี Email กรุณาติดต่อผู้สมัครโดยตรง');
    return;
  }
  
  if (!confirm(`ต้องการส่งแบบทดสอบทักษะให้ ${applicant.fullName} หรือไม่?`)) {
    return;
  }
  
  // สร้างลิงก์แบบทดสอบ
  const testUrl = `https://pakonchotbuncha-netizen.github.io/recruitment-screening/test-skill.html?token=${applicant.id}`;
  
  // สร้าง Email content
  const subject = '📝 แบบทดสอบทักษะ - บริษัท PKG';
  const body = `สวัสดีคุณ ${applicant.fullName}\n\n` +
               `กรุณาทำแบบทดสอบทักษะ (5 ข้อ) เพื่อประเมินความสามารถ\n\n` +
               `ลิงก์แบบทดสอบ: ${testUrl}\n\n` +
               `⏰ ระยะเวลา: 30 นาที\n` +
               `📅 กำหนดส่ง: ภายใน 3 วัน\n\n` +
               `ขอบคุณครับ/ค่ะ\n` +
               `ฝ่ายบุคคล PKG`;
  
  // เปิด Gmail compose
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${applicant.email}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
  
  // อัปเดตสถานะ
  applicant.skillTestStatus = 'sent';
  applicant.skillTestSent = true;
  applicant.skillTestSentDate = new Date().toISOString();
  
  localStorage.setItem('applicants', JSON.stringify(applicants));
  
  alert(`✅ ส่งแบบทดสอบให้ ${applicant.fullName} แล้ว`);
  render();
}

function viewStatus(applicantId) {
  alert('⏳ กำลังรอให้ผู้สมัครทำแบบทดสอบ');
}

function viewResult(applicantId) {
  const assessment = assessments.find(a => a.applicantId === applicantId && a.testType === 'skill');
  if (!assessment) {
    alert('❌ ไม่พบผลคะแนน');
    return;
  }
  
  alert(`📊 ผลคะแนนทักษะ\n\n` +
        `คะแนนรวม: ${assessment.totalScore} / ${assessment.maxScore}\n` +
        `เปอร์เซ็นต์: ${assessment.percentage}%\n` +
        `วันที่ทำ: ${new Date(assessment.submittedAt).toLocaleString('th-TH')}`);
}

render();
</script>
</body>
</html>
