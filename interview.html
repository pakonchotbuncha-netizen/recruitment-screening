<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สัมภาษณ์ - กระบวนการคัดกรองและสัมภาษณ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <header class="bg-gradient-to-r from-red-600 to-pink-700 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">🎤 กระบวนการสัมภาษณ์</h1>
                    <p class="text-red-100 mt-1">Step 5-8: คัดเลือก → ตอบรับ → สัมภาษณ์ → ให้คะแนน</p>
                </div>
                <a href="applicants.html" class="bg-white text-red-600 px-4 py-2 rounded-lg hover:bg-red-50">
                    ← กลับหน้ารายชื่อ
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Step 5: Select for Interview -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center mr-2 text-sm">5</span>
                คัดเลือกเข้าสัมภาษณ์ P2
            </h2>
            <div id="selectedList" class="space-y-2">
                <!-- Selected applicants -->
            </div>
        </section>

        <!-- Step 6: Interview Confirmation -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center mr-2 text-sm">6</span>
                การตอบรับการสัมภาษณ์
            </h2>
            <div id="confirmationList" class="space-y-2">
                <!-- Confirmation status -->
            </div>
        </section>

        <!-- Step 7: AI Generated Interview Form -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-purple-500 text-white rounded-full w-8 h-8 flex items-center justify-center mr-2 text-sm">7</span>
                แบบสัมภาษณ์ (AI สร้างอัตโนมัติ)
            </h2>
            <div id="interviewForm">
                <button onclick="generateInterviewForm()" class="w-full bg-purple-500 text-white px-6 py-3 rounded-lg hover:bg-purple-600 font-semibold">
                    🤖 สร้างแบบสัมภาษณ์ด้วย AI
                </button>
            </div>
        </section>

        <!-- Step 8: Interview Scoring -->
        <section class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center mr-2 text-sm">8</span>
                ให้คะแนนการสัมภาษณ์ (5 ผู้สัมภาษณ์)
            </h2>
            <div id="scoringSection">
                <div id="interviewerScores" class="space-y-4">
                    <!-- Scoring forms for 5 interviewers -->
                </div>
                <button onclick="submitInterviewScores()" class="w-full mt-4 bg-red-500 text-white px-6 py-3 rounded-lg hover:bg-red-600 font-semibold">
                    ✅ ส่งคะแนนการสัมภาษณ์
                </button>
            </div>
        </section>

        <!-- Navigation -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <button onclick="goToSummary()" class="w-full bg-indigo-500 text-white px-6 py-3 rounded-lg hover:bg-indigo-600 font-semibold">
                → ไปหน้าสรุปผล (Step 9)
            </button>
        </div>
    </main>

    <script src="js/data-store.js"></script>
    <script src="js/interview.js"></script>
</body>
</html>
