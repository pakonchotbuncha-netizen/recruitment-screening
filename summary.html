<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปผล - กระบวนการคัดกรองและสัมภาษณ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    <header class="bg-gradient-to-r from-indigo-600 to-purple-700 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">📊 สรุปผลการสัมภาษณ์</h1>
                    <p class="text-indigo-100 mt-1">Step 9: AI สรุปผลและให้ความเห็น</p>
                </div>
                <a href="applicants.html" class="bg-white text-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-50">
                    ← กลับหน้ารายชื่อ
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Applicant Info -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">ข้อมูลผู้สมัคร</h2>
            <div id="applicantDetails" class="text-gray-600">กำลังโหลด...</div>
        </div>

        <!-- Score Summary -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">สรุปคะแนนจากผู้สัมภาษณ์ 5 คน</h2>
            <div id="scoreSummary" class="space-y-4">
                <!-- Score summary will be rendered here -->
            </div>
        </div>

        <!-- AI Final Analysis -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center mr-2">🤖</span>
                AI สรุปผลและให้ความเห็น
            </h2>
            
            <button onclick="generateFinalSummary()" id="summaryBtn" class="w-full bg-indigo-500 text-white px-6 py-3 rounded-lg hover:bg-indigo-600 font-semibold mb-4">
                🧠 สร้างสรุปผลด้วย AI
            </button>

            <div id="finalSummary" class="hidden">
                <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-6">
                    <div id="summaryContent" class="space-y-4">
                        <!-- Summary will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Final Decision -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4">การตัดสินใจสุดท้าย</h2>
            <div class="flex gap-4">
                <button onclick="finalDecision('accepted')" class="flex-1 bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 font-semibold text-lg">
                    ✅ รับเข้าทำงาน
                </button>
                <button onclick="finalDecision('rejected')" class="flex-1 bg-red-500 text-white px-6 py-3 rounded-lg hover:bg-red-600 font-semibold text-lg">
                    ❌ ไม่ผ่าน
                </button>
            </div>
        </div>
    </main>

    <script src="js/data-store.js"></script>
    <script src="js/summary.js"></script>
</body>
</html>
