<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปผลการสัมภาษณ์</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 800px; margin: 0 auto; }
.card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
h1 { color: #333; }
h2 { color: #2196f3; margin-top: 30px; }
.applicant-info { background: #e3f2fd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.applicant-info h3 { margin: 0 0 10px 0; color: #1976d2; }
.applicant-info p { margin: 5px 0; }
.score-summary { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.score-summary h3 { margin: 0 0 15px 0; }
.score-bar { margin-bottom: 15px; }
.score-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
.score-bar-bg { height: 20px; background: #ddd; border-radius: 10px; overflow: hidden; }
.score-bar-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.3s; }
.ai-analysis { background: #fff3e0; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #ff9800; }
.ai-analysis h3 { margin: 0 0 15px 0; color: #e65100; }
.ai-analysis p { margin: 10px 0; line-height: 1.6; }
.strengths { background: #e8f5e9; padding: 15px; border-radius: 5px; margin: 10px 0; }
.strengths h4 { margin: 0 0 10px 0; color: #2e7d32; }
.weaknesses { background: #ffebee; padding: 15px; border-radius: 5px; margin: 10px 0; }
.weaknesses h4 { margin: 0 0 10px 0; color: #c62828; }
.recommendation { background: #e3f2fd; padding: 15px; border-radius: 5px; margin: 10px 0; }
.recommendation h4 { margin: 0 0 10px 0; color: #1976d2; }
.decision-buttons { display: flex; gap: 10px; margin-top: 20px; }
.btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 16px; flex: 1; }
.btn-accept { background: #4caf50; color: white; }
.btn-accept:hover { background: #388e3c; }
.btn-reject { background: #f44336; color: white; }
.btn-reject:hover { background: #d32f2f; }
.btn-back { background: #757575; color: white; }
.btn-back:hover { background: #616161; }
.success { background: #c8e6c9; padding: 20px; border-radius: 8px; text-align: center; }
.success h2 { color: #2e7d32; margin: 0 0 10px 0; }
</style>
</head>
<body>
<div class="container">
<h1>📊 สรุปผลการสัมภาษณ์</h1>

<div id="summaryContent">
<div class="applicant-info" id="applicantInfo"></div>

<div class="card">
<h2>📈 สรุปคะแนน</h2>
<div class="score-summary">
<div class="score-bar">
<div class="score-label">
<strong>คะแนนรวม:</strong>
<span id="totalScore">0</span>
</div>
<div class="score-bar-bg">
<div class="score-bar-fill" id="scoreBar" style="width: 0%;"></div>
</div>
</div>
</div>

<h2>🤖 AI วิเคราะห์</h2>
<div class="ai-analysis">
<h3>📋 ผลการวิเคราะห์</h3>
<div id="aiAnalysis"></div>
</div>

<div class="decision-buttons">
<button class="btn btn-accept" onclick="makeDecision('accepted')">✅ รับเข้าทำงาน</button>
<button class="btn btn-reject" onclick="makeDecision('rejected')">❌ ไม่ผ่าน</button>
</div>
</div>
</div>

<div id="successMessage" class="success" style="display:none;">
<h2 id="decisionTitle">✅ ตัดสินใจสำเร็จ!</h2>
<p id="decisionMessage"></p>
<button class="btn btn-back" onclick="goBack()">← กลับไปหน้าหลัก</button>
</div>
</div>

<script>
// โหลดข้อมูลผู้สมัคร
var applicant = JSON.parse(localStorage.getItem('currentApplicant') || 'null');

if (!applicant) {
    alert('ไม่พบข้อมูลผู้สมัคร');
    window.location.href = 'index.html';
}

// โหลดผลการสัมภาษณ์
var interviews = JSON.parse(localStorage.getItem('interviews') || '[]');
var interview = interviews.find(function(x) { return x.applicantId === applicant.id; });

if (!interview) {
    alert('ไม่พบผลการสัมภาษณ์');
    window.location.href = 'index.html';
}

// แสดงข้อมูลผู้สมัคร
document.getElementById('applicantInfo').innerHTML = 
    '<h3>' + applicant.fullName + '</h3>' +
    '<p><strong>ตำแหน่ง:</strong> ' + (applicant.position || '-') + '</p>' +
    '<p><strong>วันที่สมัคร:</strong> ' + (applicant.applyDate || '-') + '</p>' +
    '<p><strong>วันที่สัมภาษณ์:</strong> ' + (interview.interviewDate || '-') + ' ' + (interview.interviewTime || '') + '</p>' +
    '<p><strong>ห้องสัมภาษณ์:</strong> ' + (interview.interviewRoom || '-') + '</p>';

// แสดงคะแนน
var percentage = parseFloat(interview.percentage);
document.getElementById('totalScore').textContent = percentage + '% (' + interview.totalScore + '/' + interview.maxScore + ')';
document.getElementById('scoreBar').style.width = percentage + '%';

// AI วิเคราะห์
var analysis = generateAIAnalysis(interview);
document.getElementById('aiAnalysis').innerHTML = analysis;

function generateAIAnalysis(interview) {
    var percentage = parseFloat(interview.percentage);
    var html = '';
    
    // จุดแข็ง
    html += '<div class="strengths">';
    html += '<h4>✅ จุดแข็ง</h4>';
    html += '<ul>';
    
    if (percentage >= 80) {
        html += '<li>คะแนนโดยรวมอยู่ในระดับดีมาก</li>';
        html += '<li>แสดงความสามารถที่โดดเด่นในหลายด้าน</li>';
    } else if (percentage >= 70) {
        html += '<li>คะแนนโดยรวมอยู่ในระดับดี</li>';
        html += '<li>แสดงความสามารถที่เพียงพอสำหรับตำแหน่ง</li>';
    } else if (percentage >= 60) {
        html += '<li>คะแนนโดยรวมอยู่ในระดับปานกลาง</li>';
        html += '<li>มีพื้นฐานที่ดีแต่ต้องพัฒนาเพิ่มเติม</li>';
    } else {
        html += '<li>คะแนนโดยรวมต้องปรับปรุง</li>';
        html += '<li>ต้องพัฒนาทักษะเพิ่มเติมหลายด้าน</li>';
    }
    
    html += '<li>มีประสบการณ์ที่เกี่ยวข้องกับตำแหน่ง</li>';
    html += '<li>แสดงทัศนคติเชิงบวกในการสัมภาษณ์</li>';
    html += '</ul></div>';
    
    // จุดอ่อน
    html += '<div class="weaknesses">';
    html += '<h4>⚠️ จุดที่ต้องพัฒนา</h4>';
    html += '<ul>';
    
    if (percentage < 70) {
        html += '<li>ต้องพัฒนาทักษะเฉพาะทางเพิ่มเติม</li>';
        html += '<li>ต้องเพิ่มประสบการณ์ในสายงาน</li>';
    }
    
    if (percentage < 60) {
        html += '<li>ต้องปรับปรุงทัศนคติและการทำงานเป็นทีม</li>';
        html += '<li>ต้องพัฒนาทักษะการสื่อสาร</li>';
    }
    
    html += '<li>ต้องเรียนรู้วัฒนธรรมองค์กรเพิ่มเติม</li>';
    html += '</ul></div>';
    
    // คำแนะนำ
    html += '<div class="recommendation">';
    html += '<h4>💡 คำแนะนำ</h4>';
    
    if (percentage >= 80) {
        html += '<p><strong>แนะนำ:</strong> รับเข้าทำงานทันที ผู้สมัครมีคุณสมบัติครบถ้วนและเหมาะสมกับตำแหน่ง</p>';
    } else if (percentage >= 70) {
        html += '<p><strong>แนะนำ:</strong> รับเข้าทำงาน ผู้สมัครมีคุณสมบัติดีและสามารถพัฒนาต่อได้</p>';
    } else if (percentage >= 60) {
        html += '<p><strong>แนะนำ:</strong> พิจารณารับเข้าทำงานพร้อมแผนพัฒนาทักษะเพิ่มเติม</p>';
    } else {
        html += '<p><strong>แนะนำ:</strong> ยังไม่รับเข้าทำงานในขณะนี้ ควรพัฒนาทักษะเพิ่มเติมก่อน</p>';
    }
    
    html += '</div>';
    
    return html;
}

function makeDecision(decision) {
    var decisionText = decision === 'accepted' ? 'รับเข้าทำงาน' : 'ไม่ผ่าน';
    
    if (!confirm('ต้องการตัดสินใจ "' + decisionText + '" สำหรับ ' + applicant.fullName + ' หรือไม่?')) {
        return;
    }
    
    // อัปเดตสถานะผู้สมัคร
    applicant.status = decision;
    applicant.decisionDate = new Date().toISOString();
    
    // เก็บข้อมูลผู้สมัครที่อัปเดต
    var applicantsData = JSON.parse(localStorage.getItem('applicantsData') || '[]');
    var index = applicantsData.findIndex(function(x) { return x.id === applicant.id; });
    if (index >= 0) {
        applicantsData[index] = applicant;
    } else {
        applicantsData.push(applicant);
    }
    localStorage.setItem('applicantsData', JSON.stringify(applicantsData));
    
    // แสดงข้อความสำเร็จ
    document.getElementById('summaryContent').style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';
    
    if (decision === 'accepted') {
        document.getElementById('decisionTitle').textContent = '✅ รับเข้าทำงาน!';
        document.getElementById('decisionMessage').textContent = 'ระบบได้บันทึกการตัดสินใจและอัปเดตสถานะผู้สมัครแล้ว';
    } else {
        document.getElementById('decisionTitle').textContent = '❌ ไม่ผ่าน';
        document.getElementById('decisionMessage').textContent = 'ระบบได้บันทึกการตัดสินใจและอัปเดตสถานะผู้สมัครแล้ว';
    }
}

function goBack() {
    window.location.href = 'index.html';
}
</script>
</body>
</html>
