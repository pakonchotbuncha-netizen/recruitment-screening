<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบทัศนคติ - 5 ข้อ</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; }
.card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
h1 { color: #333; margin-bottom: 10px; }
.subtitle { color: #666; margin-bottom: 20px; }
.timer { background: #fff3e0; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: 600; color: #e65100; }
.timer.warning { background: #ffebee; color: #c62828; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.progress { background: #e0e0e0; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #9c27b0, #e91e63); transition: width 0.3s; }
.question { margin-bottom: 25px; padding: 20px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #9c27b0; }
.question p { font-weight: 600; margin-bottom: 15px; color: #333; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: center; padding: 12px; background: white; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.option:hover { border-color: #9c27b0; background: #f3e5f5; }
.option input[type="radio"] { margin-right: 12px; width: 20px; height: 20px; }
.option label { cursor: pointer; flex: 1; font-size: 15px; }
.option input[type="radio"]:checked + label { font-weight: 600; color: #9c27b0; }
.option.selected { border-color: #9c27b0; background: #f3e5f5; }
.btn { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 16px; }
.btn-submit { background: #4caf50; color: white; width: 100%; margin-top: 20px; }
.btn-submit:hover { background: #388e3c; }
.btn-submit:disabled { background: #ccc; cursor: not-allowed; }
.success { background: #c8e6c9; padding: 30px; border-radius: 12px; text-align: center; }
.success h2 { color: #2e7d32; margin: 0 0 15px 0; }
.score-summary { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: left; }
.score-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
.score-item:last-child { border-bottom: none; font-weight: 600; font-size: 18px; }
.error { background: #ffebee; padding: 20px; border-radius: 8px; text-align: center; color: #c62828; }
</style>
</head>
<body>
<div class="container">
<div id="content">
<div class="card">
<h1>🎯 แบบทดสอบทัศนคติ</h1>
<p class="subtitle">จำนวน 5 ข้อ | เวลา 30 นาที</p>

<div class="timer" id="timer">⏰ เวลาเหลือ: 30:00</div>

<div class="progress">
<div class="progress-bar" id="progressBar" style="width: 0%;"></div>
</div>
<p style="text-align: center; color: #666; margin-bottom: 20px;">ตอบแล้ว: <span id="answeredCount">0</span> / 5 ข้อ</p>

<div id="questions"></div>

<button class="btn btn-submit" id="submitBtn" onclick="submitAssessment()" disabled>✅ ส่งคะแนน</button>
</div>
</div>

<div id="successMessage" class="success" style="display:none;">
<h2>✅ ส่งคะแนนสำเร็จ!</h2>
<p>ขอบคุณที่ทำแบบทดสอบ</p>
<div class="score-summary" id="scoreSummary"></div>
</div>

<div id="errorMessage" class="error" style="display:none;">
<h2>❌ เกิดข้อผิดพลาด</h2>
<p id="errorText"></p>
</div>
</div>

<script>
// ดึง token จาก URL
const urlParams = new URLSearchParams(window.location.search);
const applicantToken = urlParams.get('token');

if (!applicantToken) {
  document.getElementById('content').style.display = 'none';
  document.getElementById('errorMessage').style.display = 'block';
  document.getElementById('errorText').textContent = 'ไม่พบข้อมูลผู้สมัคร กรุณาคลิกลิงก์จากอีเมล';
}

// ข้อมูลผู้สมัคร (ดึงจาก localStorage หรือ API)
const applicant = JSON.parse(localStorage.getItem('applicant_' + applicantToken) || 'null');

if (!applicant && applicantToken) {
  // สร้างข้อมูลผู้สมัครชั่วคราว
  const tempApplicant = {
    id: applicantToken,
    fullName: 'ผู้สมัคร',
    testType: 'attitude'
  };
  localStorage.setItem('applicant_' + applicantToken, JSON.stringify(tempApplicant));
}

// แบบทดสอบทัศนคติ 5 ข้อ
const questions = [
  {
    id: 'att1',
    question: 'ท่านรู้สึกอย่างไรเมื่อต้องทำงานภายใต้ความกดดัน?',
    options: [
      { value: 1, text: 'รู้สึกเครียดและหลีกเลี่ยง' },
      { value: 2, text: 'พยายามทนทำต่อไป' },
      { value: 3, text: 'หาวิธีจัดการกับความกดดัน' },
      { value: 4, text: 'มองว่าเป็นความท้าทายและเรียนรู้' },
      { value: 5, text: 'ใช้โอกาสพัฒนาตัวเองและทีม' }
    ]
  },
  {
    id: 'att2',
    question: 'เมื่อเกิดข้อขัดแย้งในทีม ท่านจะทำอย่างไร?',
    options: [
      { value: 1, text: 'หลีกเลี่ยงและไม่เข้าร่วม' },
      { value: 2, text: 'รอให้คนอื่นแก้ไข' },
      { value: 3, text: 'พยายามประนีประนอม' },
      { value: 4, text: 'รับฟังทุกฝ่ายและหาทางออก' },
      { value: 5, text: 'สร้างฉันทมติและเรียนรู้จากความขัดแย้ง' }
    ]
  },
  {
    id: 'att3',
    question: 'ท่านมีทัศนคติต่อการเปลี่ยนแปลงอย่างไร?',
    options: [
      { value: 1, text: 'ไม่ชอบเปลี่ยนแปลง ยึดติดกับวิธีเดิม' },
      { value: 2, text: 'ยอมรับแต่รู้สึกไม่สบายใจ' },
      { value: 3, text: 'ปรับตัวได้แต่ต้องใช้เวลา' },
      { value: 4, text: 'ยอมรับและมองหาโอกาสใหม่' },
      { value: 5, text: 'กระตือรือร้นและริเริ่มเปลี่ยนแปลง' }
    ]
  },
  {
    id: 'att4',
    question: 'เมื่อทำงานสำเร็จ ท่านรู้สึกอย่างไร?',
    options: [
      { value: 1, text: 'พอใจแค่ตัวเอง' },
      { value: 2, text: 'ดีใจแต่ไม่แบ่งปัน' },
      { value: 3, text: 'ขอบคุณทีมที่ช่วย' },
      { value: 4, text: 'ยกความดีให้ทีมและเรียนรู้' },
      { value: 5, text: 'แบ่งปันความสำเร็จและสร้างแรงบันดาลใจ' }
    ]
  },
  {
    id: 'att5',
    question: 'ท่านจัดการกับข้อผิดพลาดอย่างไร?',
    options: [
      { value: 1, text: 'โทษคนอื่นหรือสถานการณ์' },
      { value: 2, text: 'รู้สึกผิดและหลีกเลี่ยง' },
      { value: 3, text: 'ยอมรับและแก้ไข' },
      { value: 4, text: 'เรียนรู้และป้องกันไม่ให้เกิดซ้ำ' },
      { value: 5, text: 'แบ่งปันบทเรียนและช่วยทีมเรียนรู้' }
    ]
  }
];

// สร้างแบบทดสอบ
function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = questions.map((q, index) => {
    return `
      <div class="question">
        <p>${index + 1}. ${q.question}</p>
        <div class="options">
          ${q.options.map(opt => `
            <div class="option" onclick="selectOption('${q.id}', ${opt.value})">
              <input type="radio" name="${q.id}" value="${opt.value}" id="${q.id}_${opt.value}">
              <label for="${q.id}_${opt.value}">${opt.value} - ${opt.text}</label>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function selectOption(questionId, value) {
  // ลบ selected ทั้งหมด
  document.querySelectorAll(`input[name="${questionId}"]`).forEach(input => {
    input.parentElement.classList.remove('selected');
  });
  
  // เพิ่ม selected
  const selected = document.querySelector(`input[name="${questionId}"][value="${value}"]`);
  if (selected) {
    selected.checked = true;
    selected.parentElement.classList.add('selected');
  }
  
  updateProgress();
}

function updateProgress() {
  let answered = 0;
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="${q.id}"]:checked`);
    if (selected) answered++;
  });
  
  const percentage = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = percentage + '%';
  document.getElementById('answeredCount').textContent = answered;
  
  // เปิดปุ่มส่งถ้าตอบครบ
  document.getElementById('submitBtn').disabled = (answered < questions.length);
}

// Timer
let timeLeft = 30 * 60; // 30 นาที
function startTimer() {
  const timerInterval = setInterval(() => {
    timeLeft--;
    
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    const timerText = `⏰ เวลาเหลือ: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    const timerElement = document.getElementById('timer');
    timerElement.textContent = timerText;
    
    if (timeLeft <= 300) { // 5 นาทีสุดท้าย
      timerElement.classList.add('warning');
    }
    
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert('⏰ หมดเวลา! ระบบจะส่งคำตอบอัตโนมัติ');
      submitAssessment(true);
    }
  }, 1000);
}

function submitAssessment(autoSubmit = false) {
  // รวบรวมคะแนน
  const scores = {};
  let allAnswered = true;
  let totalScore = 0;
  
  questions.forEach(q => {
    const selected = document.querySelector(`input[name="${q.id}"]:checked`);
    if (!selected) {
      allAnswered = false;
    } else {
      const score = parseInt(selected.value);
      scores[q.id] = score;
      totalScore += score;
    }
  });
  
  if (!allAnswered && !autoSubmit) {
    alert('กรุณาตอบทุกข้อ');
    return;
  }
  
  const maxScore = questions.length * 5;
  const percentage = ((totalScore / maxScore) * 100).toFixed(1);
  
  // บันทึกผล
  const assessment = {
    applicantId: applicantToken,
    testType: 'attitude',
    scores: scores,
    totalScore: totalScore,
    maxScore: maxScore,
    percentage: percentage,
    submittedAt: new Date().toISOString()
  };
  
  // เก็บใน localStorage
  const assessments = JSON.parse(localStorage.getItem('assessments') || '[]');
  assessments.push(assessment);
  localStorage.setItem('assessments', JSON.stringify(assessments));
  
  // แสดงผลคะแนน
  const summaryHtml = `
    <h3>📊 ผลคะแนนทัศนคติ</h3>
    <div class="score-item"><span>คะแนนรวม:</span><span>${totalScore} / ${maxScore}</span></div>
    <div class="score-item"><span>เปอร์เซ็นต์:</span><span>${percentage}%</span></div>
    <div class="score-item"><span>ระดับ:</span><span>${getLevel(percentage)}</span></div>
  `;
  
  document.getElementById('scoreSummary').innerHTML = summaryHtml;
  document.getElementById('content').style.display = 'none';
  document.getElementById('successMessage').style.display = 'block';
}

function getLevel(percentage) {
  if (percentage >= 80) return '⭐⭐⭐⭐⭐ ดีมาก';
  if (percentage >= 70) return '⭐⭐⭐⭐ ดี';
  if (percentage >= 60) return '⭐⭐⭐ ปานกลาง';
  if (percentage >= 50) return '⭐⭐ พอใช้';
  return '⭐ ต้องปรับปรุง';
}

// เริ่มต้น
renderQuestions();
startTimer();
</script>
</body>
</html>
