<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>แบบทดสอบผู้สมัคร - 23 ข้อ</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 900px; margin: 0 auto; }
.card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
h1 { color: #333; margin-bottom: 10px; }
h2 { color: #9c27b0; margin-top: 30px; margin-bottom: 20px; }
.applicant-info { background: #e3f2fd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.applicant-info h3 { margin: 0 0 10px 0; color: #1976d2; }
.applicant-info p { margin: 5px 0; }
.progress { background: #e0e0e0; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #9c27b0, #e91e63); transition: width 0.3s; }
.question { margin-bottom: 25px; padding: 20px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #9c27b0; }
.question p { font-weight: 600; margin-bottom: 15px; color: #333; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: center; padding: 10px; background: white; border: 2px solid #ddd; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
.option:hover { border-color: #9c27b0; background: #f3e5f5; }
.option input[type="radio"] { margin-right: 10px; }
.option label { cursor: pointer; flex: 1; }
.option input[type="radio"]:checked + label { font-weight: 600; color: #9c27b0; }
.btn { padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 16px; }
.btn-submit { background: #4caf50; color: white; width: 100%; margin-top: 20px; }
.btn-submit:hover { background: #388e3c; }
.btn-back { background: #757575; color: white; margin-right: 10px; }
.btn-back:hover { background: #616161; }
.success { background: #c8e6c9; padding: 30px; border-radius: 8px; text-align: center; }
.success h2 { color: #2e7d32; margin: 0 0 15px 0; }
.score-summary { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
.score-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
.score-item:last-child { border-bottom: none; font-weight: 600; }
</style>
</head>

<div class="card">

<div id="attitudeQuestions"></div>

<div id="skillQuestions"></div>

<h2>🏢 แบบทดสอบทุนองค์กร CC (7 ข้อ)</h2>

<button class="btn btn-submit" onclick="submitAssessment()">✅ ส่งคะแนน (23 ข้อ)</button>
</div>
</div>

<div id="successMessage" class="success" style="display:none;">
<h2>✅ ส่งคะแนนสำเร็จ!</h2>

</div>

// Embed แบบทดสอบ 23 ข้อ

: [{"id": "3e1", "question": "3E ตัวที่ 1: Energy (พลังงาน) - ท่านมีพลังงานและแรงจูงใจในการทำงานอย่างไร?", "options": [{"value": 1, "text": "หมดแรงและขาดแรงจูงใจ"}, {"value": 2, "text": "มีพลังงานแต่ไม่สม่ำเสมอ"}, {"value": 3, "text": "มีพลังงานและแรงจูงใจในระดับหนึ่ง"}, {"value": 4, "text": "มีพลังงานสูงและสร้างแรงบันดาลใจ"}, {"value": 5, "text": "เป็นแหล่งพลังงานและสร้างแรงจูงใจให้ทีม"}]}, {"id": "3e2", "question": "3E ตัวที่ 2: Enthusiasm (ความกระตือรือร้น) - ท่านมีความกระตือรือร้นต่องานอย่างไร?", "options": [{"value": 1, "text": "ไม่มีความกระตือรือร้น"}, {"value": 2, "text": "ทำตามที่บอกเท่านั้น"}, {"value": 3, "text": "กระตือรือร้นในงานที่สนใจ"}, {"value": 4, "text": "กระตือรือร้นและสร้างแรงบันดาลใจ"}, {"value": 5, "text": "เป็นผู้นำและสร้างวัฒนธรรมความกระตือรือร้น"}]}, {"id": "3e3", "question": "3E ตัวที่ 3: Execution (การลงมือทำ) - ท่านสามารถแปลงแผนไปสู่การปฏิบัติได้อย่างไร?", "options": [{"value": 1, "text": "ไม่ลงมือทำ"}, {"value": 2, "text": "ลงมือทำแต่ไม่สำเร็จ"}, {"value": 3, "text": "ลงมือทำและสำเร็จในบางเรื่อง"}, {"value": 4, "text": "ลงมือทำและสำเร็จอย่างสม่ำเสมอ"}, {"value": 5, "text": "ลงมือทำและสร้างผลลัพธ์ที่ยอดเยี่ยม"}]}, {"id": "3p1", "question": "3P ตัวที่ 1: Purpose (เป้าหมาย) - ท่านมีเป้าหมายและวิสัยทัศน์อย่างไร?", "options": [{"value": 1, "text": "ไม่มีเป้าหมาย"}, {"value": 2, "text": "มีเป้าหมายแต่ไม่ชัดเจน"}, {"value": 3, "text": "มีเป้าหมายและวางแผน"}, {"value": 4, "text": "มีเป้าหมายชัดเจนและมุ่งมั่น"}, {"value": 5, "text": "มีวิสัยทัศน์และสร้างแรงบันดาลใจให้ทีม"}]}, {"id": "3p2", "question": "3P ตัวที่ 2: Passion (ความหลงใหล) - ท่านมีความหลงใหลในงานอย่างไร?", "options": [{"value": 1, "text": "ไม่มีความหลงใหล"}, {"value": 2, "text": "ทำเพราะจำเป็น"}, {"value": 3, "text": "หลงใหลในงานบางด้าน"}, {"value": 4, "text": "หลงใหลและสร้างคุณค่า"}, {"value": 5, "text": "หลงใหลและส่งต่อความหลงใหลให้ทีม"}]}, {"id": "3p3", "question": "3P ตัวที่ 3: Perseverance (ความพากเพียร) - ท่านมีความพากเพียรต่ออุปสรรคอย่างไร?", "options": [{"value": 1, "text": "ยอมแพ้ง่าย"}, {"value": 2, "text": "พยายามแต่ล้มเลิกเร็ว"}, {"value": 3, "text": "พากเพียรในระดับหนึ่ง"}, {"value": 4, "text": "พากเพียรและหาทางแก้"}, {"value": 5, "text": "ไม่ยอมแพ้และสร้างความสำเร็จ"}]}]};

// สร้างแบบทดสอบ
function renderQuestions(category, containerId) {
    var container = document.getElementById(containerId);
    var html = questions[category].map(function(q, index) {
        return '<div class="question">' +
               '<p>' + (index + 1) + '. ' + q.question + '</p>' +
               '<div class="options">' +
               q.options.map(function(opt) {
                   return '<div class="option">' +
                          '<input type="radio" name="' + q.id + '" value="' + opt.value + '" id="' + q.id + '_' + opt.value + '" onchange="updateProgress()">' +
                          '<label for="' + q.id + '_' + opt.value + '">' + opt.value + ' - ' + opt.text + '</label>' +
                          '</div>';
               }).join('') +
               '</div></div>';
    }).join('');
    container.innerHTML = html;
}

renderQuestions('attitude', 'attitudeQuestions');
renderQuestions('skill', 'skillQuestions');
renderQuestions('cc', 'ccQuestions');
renderQuestions('3e3p', '3e3pQuestions');

function updateProgress() {
    var answered = 0;
    var total = 23;
    
    Object.keys(questions).forEach(function(category) {
        questions[category].forEach(function(q) {
            var selected = document.querySelector('input[name="' + q.id + '"]:checked');
            if (selected) answered++;
        });
    });
    
    var percentage = (answered / total) * 100;
    document.getElementById('progressBar').style.width = percentage + '%';
    document.getElementById('answeredCount').textContent = answered;
}

function submitAssessment() {
    // รวบรวมคะแนน
    var scores = {};
    var allAnswered = true;
    var totalScore = 0;
    var totalMax = 0;
    
    Object.keys(questions).forEach(function(category) {
        scores[category] = {};
        questions[category].forEach(function(q) {
            var selected = document.querySelector('input[name="' + q.id + '"]:checked');
            if (!selected) {
                allAnswered = false;
            } else {
                var score = parseInt(selected.value);
                scores[category][q.id] = score;
                totalScore += score;
                totalMax += 5;
            }
        });
    });
    
    if (!allAnswered) {
        alert('กรุณาตอบทุกข้อ (23 ข้อ)');
        return;
    }
    
    // คำนวณคะแนนรวม
    var percentage = ((totalScore / totalMax) * 100).toFixed(1);
    
    // บันทึกผล
    var assessment = {
        applicantId: applicant.id,
        scores: scores,
        totalScore: totalScore,
        maxScore: totalMax,
        percentage: percentage,
        submittedAt: new Date().toISOString()
    };
    
    // เก็บใน localStorage
    var assessments = JSON.parse(localStorage.getItem('assessments') || '[]');
    assessments.push(assessment);
    localStorage.setItem('assessments', JSON.stringify(assessments));
    
    // อัปเดตสถานะผู้สมัคร
    applicant.status = 'assessed';
    applicant.assessmentDate = new Date().toISOString();
    applicant.assessmentScore = percentage;
    
    // เก็บข้อมูลผู้สมัครที่อัปเดต
    var applicantsData = JSON.parse(localStorage.getItem('applicantsData') || '[]');
    var index = applicantsData.findIndex(function(x) { return x.id === applicant.id; });
    if (index >= 0) {
        applicantsData[index] = applicant;
    } else {
        applicantsData.push(applicant);
    }
    localStorage.setItem('applicantsData', JSON.stringify(applicantsData));
    
    // แสดงผลคะแนน
    var summaryHtml = '<h3>📊 ผลคะแนน</h3>';
    summaryHtml += '<div class="score-item"><span>คะแนนรวม:</span><span>' + totalScore + ' / ' + totalMax + ' (' + percentage + '%)</span></div>';
    
    Object.keys(questions).forEach(function(category) {
        var catScore = 0;
        var catMax = 0;
        questions[category].forEach(function(q) {
            catScore += scores[category][q.id];
            catMax += 5;
        });
        var catPercentage = ((catScore / catMax) * 100).toFixed(1);
        var catName = {
            'attitude': '🎯 ทัศนคติ',
            'skill': '💡 ทักษะ',
            'cc': '🏢 ทุนองค์กร',
            '3e3p': '📊 3E3P'
        }[category];
        summaryHtml += '<div class="score-item"><span>' + catName + ':</span><span>' + catScore + ' / ' + catMax + ' (' + catPercentage + '%)</span></div>';
    });
    
    document.getElementById('scoreSummary').innerHTML = summaryHtml;
    
    // แสดงข้อความสำเร็จ
    document.getElementById('assessmentContent').style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';
}

function goBack() {
    window.location.href = 'index.html';
}
</script>
